<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JS + CSS Clock</title>
    <link rel="icon" href="https://fav.farm/🔥" />
  </head>
  <body>
    <div class="clock">
      <div class="clock-face">
        <div class="hand hour-hand"></div>
        <div class="hand min-hand"></div>
        <div class="hand second-hand"></div>
      </div>
    </div>

    <style>
      html {
        background: #018ded
          url(https://images.pexels.com/photos/4322412/pexels-photo-4322412.jpeg);
        background-size: cover;
        font-family: "helvetica neue";
        text-align: center;
        font-size: 10px;
      }

      body {
        margin: 0;
        font-size: 2rem;
        display: flex;
        flex: 1;
        min-height: 100vh;
        align-items: center;
      }

      .clock {
        width: 30rem;
        height: 30rem;
        border: 20px solid white;
        border-radius: 50%;
        margin: 50px auto;
        position: relative;
        padding: 2rem;
        box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.1), inset 0 0 0 3px #efefef,
          inset 0 0 10px black, 0 0 10px rgba(0, 0, 0, 0.2);
      }

      .clock-face {
        position: relative;
        width: 100%;
        height: 100%;
        transform: translateY(
          -3px
        ); /* account for the height of the clock hands */
      }

      .hand {
        width: 50%;
        height: 6px;
        background: black;
        position: absolute;
        top: 50%;

        transform-origin: 100%;
        transform: rotate(90deg);
        transition: all 0.05s;
      }

      .second-hand {
        background: red;
      }

      .hour-hand {
        width: 35%;
        right: 50%;
        background: black;
      }
    </style>

    <script>
      const secondHand = document.querySelector(".second-hand");
      const minHand = document.querySelector(".min-hand");
      const hourHand = document.querySelector(".hour-hand");

      function getDate() {
        const now = new Date();

        const seconds = now.getSeconds();
        console.log(seconds);

        // prettier-ignore
        const secondsDegrees = ((seconds / 60) * 360) + 90;

        secondHand.style.transition =
          seconds === 0
            ? "none"
            : "transform 0.05s cubic-bezier(0.1, 2.7, 0.58, 1)";

        secondHand.style.transform = `rotate(${secondsDegrees}deg)`;

        const minutes = now.getMinutes();
        // console.log(minutes);

        // prettier-ignore
        const miuntesToDegrees = ((minutes / 60) * 360) + 90;

        minHand.style.transform = `rotate(${miuntesToDegrees}deg)`;
        minHand.style.transition =
          minutes === 0
            ? "none"
            : "transform 0.05s cubic-bezier(0.1, 2.7, 0.58, 1)";

        const hours = now.getHours();

        // prettier-ignore
        const hoursToDegrees = ((hours / 12) * 360) + 90;

        hourHand.style.transform = `rotate(${hoursToDegrees}deg)`;
        hourHand.style.transition =
          hours === 0
            ? "none"
            : "transform 0.05s cubic-bezier(0.1, 2.7, 0.58, 1)";
      }

      setInterval(getDate, 1000);
    </script>
  </body>
</html>
